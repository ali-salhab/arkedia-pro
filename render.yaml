services:
  - type: web
    name: arkedia-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node src/seed.js && node src/index.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ACCESS_TOKEN_EXPIRES
        value: 15m
      - key: REFRESH_TOKEN_EXPIRES
        value: 7d
      - key: CLIENT_ORIGIN
        sync: false
      - key: NODE_ENV
        value: production

  - type: web
    name: arkedia-pro-1
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
